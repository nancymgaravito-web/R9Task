            const [showAuthWarning, setShowAuthWarning] = useState(false);
            
            // Datos
            const [tasks, setTasks] = useState(initialTasks);
            const [questions, setQuestions] = useState(initialQuestions);
            
            // Listas ordenadas calculadas dinámicamente desde las tareas (Automático de la A a la Z)
            const sortedSegmentos = useMemo(() => {
                const unique = new Set(tasks.map(t => t.segmento).filter(Boolean));
                // Aseguramos que los de initialQuestions también estén
                questions.forEach(q => { if(q.segmento) unique.add(q.segmento) });
                return [...unique].sort((a,b) => a.localeCompare(b));
            }, [tasks, questions]);

            const sortedSistemas = useMemo(() => {
                const unique = new Set(tasks.map(t => t.sistema).filter(Boolean));
                return [...unique].sort((a,b) => a.localeCompare(b));
            }, [tasks]);

            const sortedResponsables = useMemo(() => {
                const unique = new Set();
                tasks.forEach(t => t.responsable.forEach(r => unique.add(r)));
                questions.forEach(q => q.responsable.forEach(r => unique.add(r)));
                // Incorporamos los que estén por defecto por si no se han usado aún
                defaultListas.responsables.forEach(r => unique.add(r));
                return [...unique].sort((a,b) => a.localeCompare(b));
            }, [tasks, questions]);
            
            // Filtros Tareas
            const [taskFilterPais, setTaskFilterPais] = useState('Todos');
            const [taskFilterSegmento, setTaskFilterSegmento] = useState('Todos');
            const [taskFilterResponsable, setTaskFilterResponsable] = useState('Todos');

            // Filtros Preguntas
            const [qFilterPais, setQFilterPais] = useState('Todos');
            const [qFilterSegmento, setQFilterSegmento] = useState('Todos');
            const [qFilterResponsable, setQFilterResponsable] = useState('Todos');


            // --- AUTENTICACIÓN FIREBASE ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                        setAuthError(null);
                        setShowAuthWarning(false);
                    } catch (error) {
                        console.warn("Aviso Firebase:", error.message);
                        setAuthError("Modo Local Habilitado");
                        if (error.code === 'auth/configuration-not-found' || error.code === 'auth/operation-not-allowed') {
                            setShowAuthWarning(true);
                        }
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // --- SINCRONIZACIÓN DE DATOS (FIRESTORE) ---
            useEffect(() => {
                if (!user) return;

                const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
                const questionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');

                const unsubTasks = onSnapshot(tasksRef, (snapshot) => {
                    if (snapshot.empty) {
                        initialTasks.forEach(t => setDoc(doc(tasksRef, t.id.toString()), t));
                    } else {
                        const loadedTasks = [];
                        snapshot.forEach(doc => loadedTasks.push(doc.data()));
                        setTasks(loadedTasks.sort((a,b) => b.id - a.id)); 
                    }
                });

                const unsubQuestions = onSnapshot(questionsRef, (snapshot) => {
                    if (snapshot.empty) {
                        initialQuestions.forEach(q => setDoc(doc(questionsRef, q.id.toString()), q));
                    } else {
                        const loadedQs = [];
                        snapshot.forEach(doc => loadedQs.push(doc.data()));
                        setQuestions(loadedQs.sort((a,b) => b.id - a.id)); 
                    }
                    setIsConnected(true);
                    if (!showAuthWarning) setAuthError(null);
                });

                return () => {
                    unsubTasks();
                    unsubQuestions();
                };
            }, [user]);

            const generateId = () => Math.floor(Math.random() * 1000000);

            // --- LÓGICA DE DATOS: TAREAS ---
            const addTask = async () => {
                const newTask = { id: generateId(), segmento: "", sistema: "", accion: "", responsable: [], pais: "", c1: "", c2: "", c3: "", c4: "", c5: "" };
                if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', newTask.id.toString()), newTask);
                else setTasks([newTask, ...tasks]);
            };
            
            const updateTask = async (id, field, value) => {
                if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id.toString()), { [field]: value }, { merge: true });
                else setTasks(tasks.map(t => (t.id === id ? { ...t, [field]: value } : t)));
            };
            
            const deleteTask = async (id) => {
                if (user) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id.toString()));
                else setTasks(tasks.filter(t => t.id !== id));
            };

            // --- LÓGICA DE DATOS: PREGUNTAS ---
            const addQuestion = async () => {
                const newQ = { id: generateId(), segmento: "", pregunta: "", questionEng: "", pais: "", responsable: [], solicitado: "N", fecha: "", respuesta: "" };
                if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', newQ.id.toString()), newQ);
                else setQuestions([newQ, ...questions]);
            };
            
            const updateQuestion = async (id, field, value) => {
                let updates = { [field]: value };
                const questionToUpdate = questions.find(q => q.id === id);
                if (field === 'pregunta' && questionToUpdate && value !== questionToUpdate.pregunta && questionToUpdate.questionEng !== "" && !questionToUpdate.questionEng.includes("[Pending Translation]")) {
                    updates.questionEng = `[Pending Translation] ...`;
                }

                if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id.toString()), updates, { merge: true });
                else setQuestions(questions.map(q => (q.id === id ? { ...q, ...updates } : q)));
            };
            
            const deleteQuestion = async (id) => {
                if (user) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id.toString()));
                else setQuestions(questions.filter(q => q.id !== id));
            };

            // --- FILTRADO ---
            const filteredTasks = tasks.filter(t => 
                (taskFilterPais === 'Todos' || t.pais === taskFilterPais || t.pais === 'ALL') &&
                (taskFilterSegmento === 'Todos' || t.segmento === taskFilterSegmento) &&
                (taskFilterResponsable === 'Todos' || (t.responsable && t.responsable.includes(taskFilterResponsable)))
            );

            const filteredQuestions = questions.filter(q => 
                (qFilterPais === 'Todos' || q.pais === qFilterPais || q.pais === 'ALL') &&
                (qFilterSegmento === 'Todos' || q.segmento === qFilterSegmento) &&
                (qFilterResponsable === 'Todos' || (q.responsable && q.responsable.includes(qFilterResponsable)))
            );

            // --- MÉTRICAS Y GRÁFICOS ---
            const metrics = useMemo(() => {
                let totalCells = 0;
                let completedCells = 0;
                let inProgressCells = 0;

                filteredTasks.forEach(t => {
                    const cortes = [t.c1, t.c2, t.c3, t.c4, t.c5];
                    cortes.forEach(c => {
                        if (c === "Aplica" || c === "En Proceso" || c === "Completado") totalCells++;
                        if (c === "Completado") completedCells++;
                        if (c === "En Proceso") inProgressCells++;
                    });
                });

                const progressPct = totalCells === 0 ? 0 : Math.round((completedCells / totalCells) * 100);

                return {
                    totalTasks: filteredTasks.length,
                    inProgress: inProgressCells,
                    completed: completedCells,
                    progressPct
                };
            }, [filteredTasks]);

            const countryProgress = useMemo(() => {
                const stats = {
                    'Argentina': { total: 0, completed: 0, flag: '🇦🇷' },
                    'Mexico': { total: 0, completed: 0, flag: '🇲🇽' },
                    'Chile': { total: 0, completed: 0, flag: '🇨🇱' },
                    'Brazil': { total: 0, completed: 0, flag: '🇧🇷' }
                };

                tasks.forEach(t => {
                    if(stats[t.pais]) {
                        const cortes = [t.c1, t.c2, t.c3, t.c4, t.c5];
                        cortes.forEach(c => {
                            if (c === "Aplica" || c === "En Proceso" || c === "Completado") stats[t.pais].total++;
                            if (c === "Completado") stats[t.pais].completed++;
                        });
                    }
                });

                return Object.entries(stats).map(([name, data]) => {
                    const pct = data.total === 0 ? 0 : Math.round((data.completed / data.total) * 100);
                    return { name, ...data, pct };
                });
            }, [tasks]);

            // --- COMPONENTES UI REUTILIZABLES ---
            const TextInput = ({ value, onChange, placeholder = "Escribe aquí...", className = "", allowCopy = false }) => {
                const [localValue, setLocalValue] = useState(value || "");
                const [copied, setCopied] = useState(false);

                useEffect(() => { setLocalValue(value || ""); }, [value]);

                const handleCopy = () => {
                    if (!localValue) return;
                    const textArea = document.createElement("textarea");
                    textArea.value = localValue;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch (err) {}
                    document.body.removeChild(textArea);
                };

                return (
                <div className="relative w-full group/copy h-full">
                    <textarea 
                    value={localValue} 
                    onChange={(e) => setLocalValue(e.target.value)}
                    onBlur={() => { if (localValue !== value) onChange(localValue); }}
                    placeholder={placeholder}
                    rows="2"
                    className={`w-full bg-transparent text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white rounded px-2 py-1.5 transition-colors border border-transparent hover:border-slate-300 resize-y min-h-[44px] ${className} ${allowCopy ? 'pr-8' : ''}`}
                    />
                    {allowCopy && localValue && (
                    <button onClick={handleCopy} className="absolute top-1 right-1 p-1.5 text-slate-400 hover:text-blue-600 bg-white/90 backdrop-blur-sm rounded opacity-0 group-hover/copy:opacity-100 transition-opacity shadow-sm border border-slate-200 z-10" title="Copiar texto">
                        {copied ? <SmallCheckIcon /> : <CopyIcon />}
                    </button>
                    )}
                </div>
                );
            };

            const SelectInput = ({ value, options, onChange, className = "" }) => (
                <select 
                value={value || ""} 
                onChange={(e) => onChange(e.target.value)}
                className={`w-full bg-transparent text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white rounded px-2 py-1.5 cursor-pointer appearance-none transition-colors border border-transparent hover:border-slate-300 font-medium ${className}`}
                >
                <option value="" className="text-slate-400">Seleccionar...</option>
                {options.map(opt => <option key={opt} value={opt} className="bg-white text-slate-800 font-normal">{opt}</option>)}
                </select>
            );

            // NUEVO: Combobox para escritura libre + dropdown sugerido
            const ComboboxInput = ({ value, options, onChange, placeholder, listId, className = "" }) => {
                const [localValue, setLocalValue] = useState(value || "");

                useEffect(() => { setLocalValue(value || ""); }, [value]);

                return (
                    <div className="relative w-full">
                        <input 
                            list={listId}
                            value={localValue} 
                            onChange={(e) => setLocalValue(e.target.value)}
                            onBlur={() => { if (localValue !== value) onChange(localValue); }}
                            placeholder={placeholder}
                            className={`w-full bg-transparent text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white rounded px-2 py-1.5 transition-colors border border-transparent hover:border-slate-300 font-medium ${className}`}
                        />
                        <datalist id={listId}>
                            {options.map(opt => <option key={opt} value={opt} />)}
                        </datalist>
                    </div>
                );
            };

            const MultiSelectDropdown = ({ value = [], options, onChange, placeholder = "Seleccionar..." }) => {
                const [isOpen, setIsOpen] = useState(false);
                const safeValue = Array.isArray(value) ? value : [];

                const toggleOption = (opt) => {
                    if (safeValue.includes(opt)) onChange(safeValue.filter(v => v !== opt));
                    else onChange([...safeValue, opt]);
                };

                return (
                <div className="relative">
                    <div onClick={() => setIsOpen(!isOpen)} className="w-full bg-transparent text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white rounded px-2 py-1.5 cursor-pointer transition-colors border border-transparent hover:border-slate-300 flex justify-between items-center">
                    <span className="truncate max-w-[150px] font-medium text-sm">
                        {safeValue.length > 0 ? safeValue.join(', ') : <span className="text-slate-400">{placeholder}</span>}
                    </span>
                    <span className="text-slate-400 ml-2 flex-shrink-0"><ChevronDownIcon /></span>
                    </div>
                    {isOpen && (
                    <>
                        <div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div>
                        <div className="absolute z-20 mt-1 w-64 bg-white border border-slate-200 rounded-lg shadow-xl max-h-64 overflow-y-auto left-0 py-2">
                        {options.map(opt => (
                            <label key={opt} className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors group">
                            <input type="checkbox" checked={safeValue.includes(opt)} onChange={() => toggleOption(opt)} className="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 focus:ring-2 mr-3 cursor-pointer" />
                            <span className={`text-sm ${safeValue.includes(opt) ? 'font-semibold text-blue-700' : 'text-slate-700 group-hover:text-blue-600'}`}>{opt}</span>
                            </label>
                        ))}
                        </div>
                    </>
                    )}
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-6 selection:bg-blue-200">
                
                {/* --- HEADER --- */}
                <header className="mb-6 pb-6 border-b border-slate-200 flex flex-col gap-6">
                    <div className="flex flex-col xl:flex-row xl:items-start justify-between gap-4">
                        <div className="flex items-start gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 mb-1 flex items-center gap-2">
                                Project Control <span className="bg-blue-600 text-white px-2 py-0.5 rounded-lg text-2xl shadow-sm tracking-widest">WMG</span>
                                </h1>
                                <div className="flex items-center gap-2">
                                    <p className="text-sm text-slate-500 font-medium">Dashboard de Migración LATAM</p>
                                    <div className="flex items-center gap-1.5 ml-4 bg-white px-2 py-1 rounded-full border border-slate-200 shadow-sm" title={authError || (isConnected ? "Sincronizado en línea" : "Iniciando modo offline...")}>
                                        <CloudSyncIcon connected={isConnected} error={!!authError} />
                                        <span className={`text-[10px] font-bold uppercase ${authError ? 'text-amber-600' : isConnected ? 'text-emerald-600' : 'text-slate-400'}`}>
                                        {authError ? 'Offline (Local)' : isConnected ? 'En Línea' : 'Conectando...'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* GRÁFICO DE CUMPLIMIENTO POR PAÍS */}
                        <div className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-6 overflow-x-auto min-w-max">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-widest pl-2 border-r border-slate-100 pr-4">Cumplimiento</span>
                            {countryProgress.map(cp => (
                                <div key={cp.name} className="flex flex-col gap-1 min-w-[100px]">
                                    <div className="flex justify-between items-center text-sm">
                                        <span className="font-medium text-slate-700">{cp.flag} {cp.name}</span>
                                        <span className="font-bold text-blue-700">{cp.pct}%</span>
                                    </div>
                                    <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200/50">
                                        <div className="bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style={{width: `${cp.pct}%`}}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Filtros Tareas */}
                    {activeTab === 'tasks' && (
                    <div className="flex flex-wrap items-center gap-3 bg-white p-2.5 rounded-xl border border-slate-200 shadow-sm">
                        <div className="flex items-center gap-2 px-2 text-slate-500 border-r border-slate-100">
                        <FilterIcon />
                        <span className="text-sm font-semibold hidden md:inline">Filtros Tareas:</span>
                        </div>
                        <select value={taskFilterPais} onChange={(e) => setTaskFilterPais(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-medium">
                            <option value="Todos">País: Todos</option>
                            {opcionesPais.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <select value={taskFilterSegmento} onChange={(e) => setTaskFilterSegmento(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer max-w-[200px] truncate font-medium">
                            <option value="Todos">Segmento: Todos</option>
                            {sortedSegmentos.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        <select value={taskFilterResponsable} onChange={(e) => setTaskFilterResponsable(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer max-w-[200px] truncate font-medium">
                            <option value="Todos">Responsable: Todos</option>
                            {sortedResponsables.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                    </div>
                    )}

                    {/* Filtros Preguntas */}
                    {activeTab === 'questions' && (
                    <div className="flex flex-wrap items-center gap-3 bg-white p-2.5 rounded-xl border border-slate-200 shadow-sm">
                        <div className="flex items-center gap-2 px-2 text-slate-500 border-r border-slate-100">
                        <FilterIcon />
                        <span className="text-sm font-semibold hidden md:inline">Filtros Preguntas:</span>
                        </div>
                        <select value={qFilterPais} onChange={(e) => setQFilterPais(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-medium">
                            <option value="Todos">País: Todos</option>
                            {opcionesPais.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <select value={qFilterSegmento} onChange={(e) => setQFilterSegmento(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer max-w-[200px] truncate font-medium">
                            <option value="Todos">Segmento: Todos</option>
                            {sortedSegmentos.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        <select value={qFilterResponsable} onChange={(e) => setQFilterResponsable(e.target.value)} className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer max-w-[200px] truncate font-medium">
                            <option value="Todos">Responsable: Todos</option>
                            {sortedResponsables.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                    </div>
                    )}
                </header>

                {/* --- AVISO DE ERROR DE CONFIGURACIÓN FIREBASE --- */}
                {showAuthWarning && (
                    <div className="bg-amber-100 border border-amber-300 text-amber-900 px-5 py-4 rounded-xl mb-6 shadow-sm flex items-start justify-between">
                        <div>
                            <strong className="block text-lg mb-1">⚠️ Firebase - Modo de Lectura Local</strong>
                            El tablero funciona de forma local y los cambios no se sincronizarán con los demás. Para solucionarlo y activar el modo en tiempo real, ve a la <strong>Consola de Firebase</strong> (proyecto: <em>main-task-r9-latam</em>):
                            <br/>1. Ve a <strong>Authentication &gt; Sign-in method</strong>, y habilita <strong>Anónimo (Anonymous)</strong>.
                            <br/>2. Ve a <strong>Firestore Database &gt; Rules</strong> y asegura: <code>allow read, write: if true;</code>
                        </div>
                        <button onClick={() => setShowAuthWarning(false)} className="text-amber-700 hover:text-amber-900 ml-4 p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                )}

                {/* --- PANEL DE MÉTRICAS GLOBALES (Solo visible en tareas) --- */}
                {activeTab === 'tasks' && (
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                            <div className="p-3 bg-blue-50 rounded-xl"><TargetIcon /></div>
                            <div>
                            <p className="text-sm text-slate-500 font-medium">Tareas Listadas</p>
                            <p className="text-2xl font-bold text-slate-800">{metrics.totalTasks}</p>
                            </div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                            <div className="p-3 bg-amber-50 rounded-xl"><ClockIcon /></div>
                            <div>
                            <p className="text-sm text-slate-500 font-medium">Hitos En Proceso</p>
                            <p className="text-2xl font-bold text-slate-800">{metrics.inProgress}</p>
                            </div>
                        </div>
                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                            <div className="p-3 bg-emerald-50 rounded-xl"><CheckCircleIcon /></div>
                            <div>
                            <p className="text-sm text-slate-500 font-medium">Hitos Completados</p>
                            <p className="text-2xl font-bold text-slate-800">{metrics.completed}</p>
                            </div>
                        </div>
                        <div className="bg-gradient-to-br from-blue-700 to-indigo-900 p-5 rounded-2xl shadow-md flex items-center justify-between text-white hover:shadow-lg transition-shadow">
                            <div>
                            <p className="text-sm text-blue-100 font-medium">Progreso Global</p>
                            <p className="text-3xl font-extrabold">{metrics.progressPct}%</p>
                            </div>
                            <svg viewBox="0 0 36 36" className="w-14 h-14 drop-shadow-md">
                            <path className="text-blue-900/40" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                            <path className="text-white" strokeDasharray={`${metrics.progressPct}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                            </svg>
                        </div>
                    </div>
                )}

                {/* Tabs Principales */}
                <div className="flex gap-3 mb-6 overflow-x-auto pb-2">
                    <button 
                        onClick={() => setActiveTab('tasks')}
                        className={`flex whitespace-nowrap items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm ${activeTab === 'tasks' ? 'bg-slate-900 text-white border border-slate-900 scale-105' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:text-slate-900'}`}
                    >
                        <DashboardIcon /> Acciones Internas
                    </button>
                    <button 
                        onClick={() => setActiveTab('questions')}
                        className={`flex whitespace-nowrap items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm ${activeTab === 'questions' ? 'bg-slate-900 text-white border border-slate-900 scale-105' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:text-slate-900'}`}
                    >
                        <QuestionIcon /> Preguntas para FIT
                    </button>
                    <button 
                        onClick={() => setActiveTab('config')}
                        className={`flex whitespace-nowrap items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm ml-auto ${activeTab === 'config' ? 'bg-blue-600 text-white border border-blue-600 scale-105' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:text-slate-900'}`}
                    >
                        <SettingsIcon /> Configuración
                    </button>
                </div>

                {/* Contenedor Vistas */}
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden min-h-[500px]">
                    
                    {/* VISTA: CONFIGURACIÓN DE LISTAS */}
                    {activeTab === 'config' && (
                        <div className="p-6">
                            <h2 className="text-xl font-bold text-slate-800 tracking-tight mb-6 flex items-center gap-2"><SettingsIcon /> Directorio de Listas Desplegables</h2>
                            <p className="text-sm text-slate-500 mb-8">Esta sección extrae automáticamente todos los nombres ingresados en el tablero para ordenarlos. Si agregas algo en las tablas, aparecerá aquí.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                    <h3 className="font-bold text-slate-800 mb-3 border-b pb-2 border-slate-200">Segmentos ({sortedSegmentos.length})</h3>
                                    <ul className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {sortedSegmentos.map(opt => <li key={opt} className="bg-white border border-slate-200 px-3 py-2 rounded-lg text-sm text-slate-700">{opt}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                    <h3 className="font-bold text-slate-800 mb-3 border-b pb-2 border-slate-200">Sistemas ({sortedSistemas.length})</h3>
                                    <ul className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {sortedSistemas.map(opt => <li key={opt} className="bg-white border border-slate-200 px-3 py-2 rounded-lg text-sm text-slate-700">{opt}</li>)}
                                    </ul>
                                </div>
                                <div className="bg-slate-50 rounded-xl p-4 border border-slate-200">
                                    <h3 className="font-bold text-slate-800 mb-3 border-b pb-2 border-slate-200">Responsables ({sortedResponsables.length})</h3>
                                    <ul className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {sortedResponsables.map(opt => <li key={opt} className="bg-white border border-slate-200 px-3 py-2 rounded-lg text-sm text-slate-700">{opt}</li>)}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA: TAREAS */}
                    {activeTab === 'tasks' && (
                    <div className="p-0">
                        <div className="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50/50">
                        <h2 className="text-xl font-bold text-slate-800 tracking-tight">Registro de Actividades y Cortes</h2>
                        <button onClick={addTask} className="flex items-center gap-2 text-sm bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2.5 rounded-lg transition-colors shadow-sm">
                            <PlusIcon /> Añadir Tarea
                        </button>
                        </div>
                        
                        <div className="overflow-x-auto pb-48">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100 text-slate-600 uppercase text-[11px] tracking-wider">
                            <tr>
                                <th className="p-4 font-bold border-b border-slate-200">Segmento</th>
                                <th className="p-4 font-bold border-b border-slate-200">Sistema</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[350px]">Acción</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[200px]">Responsable(s)</th>
                                <th className="p-4 font-bold border-b border-slate-200">País</th>
                                <th className="p-3 font-bold border-b border-slate-200 bg-blue-50/80 text-center">Corte 1 <br/><span className="text-[10px] font-medium text-slate-500">30-Jun-26</span></th>
                                <th className="p-3 font-bold border-b border-slate-200 bg-blue-50/80 text-center">Corte 2 <br/><span className="text-[10px] font-medium text-slate-500">20-Jul-26</span></th>
                                <th className="p-3 font-bold border-b border-slate-200 bg-blue-50/80 text-center">Corte 3 <br/><span className="text-[10px] font-medium text-slate-500">20-Ago-26</span></th>
                                <th className="p-3 font-bold border-b border-slate-200 bg-blue-50/80 text-center">Corte 4 <br/><span className="text-[10px] font-medium text-slate-500">18-Sep-26</span></th>
                                <th className="p-3 font-bold border-b border-slate-200 bg-blue-50/80 text-center">Corte 5 <br/><span className="text-[10px] font-medium text-slate-500">15-Oct-26</span></th>
                                <th className="p-4 font-bold border-b border-slate-200 text-center"></th>
                            </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                            {filteredTasks.map(task => (
                                <tr key={task.id} className="hover:bg-slate-50/80 transition-colors group">
                                <td className="p-3 w-40 align-top"><ComboboxInput value={task.segmento} options={sortedSegmentos} onChange={(val) => updateTask(task.id, 'segmento', val)} placeholder="Ej: Regalias" listId={`t-seg-${task.id}`} /></td>
                                <td className="p-3 w-40 align-top"><ComboboxInput value={task.sistema} options={sortedSistemas} onChange={(val) => updateTask(task.id, 'sistema', val)} placeholder="Ej: WARS" listId={`t-sis-${task.id}`} /></td>
                                <td className="p-3 align-top">
                                    <div className="w-full relative group/input">
                                    <TextInput value={task.accion} onChange={(val) => updateTask(task.id, 'accion', val)} placeholder="Detalle de la acción..." allowCopy={true} />
                                    </div>
                                </td>
                                <td className="p-3 w-52 align-top">
                                    <MultiSelectDropdown value={task.responsable} options={sortedResponsables} onChange={(val) => updateTask(task.id, 'responsable', val)} />
                                </td>

                                <td className="p-3 w-32 align-top">
                                    <select 
                                    value={task.pais} 
                                    onChange={(e) => updateTask(task.id, 'pais', e.target.value)}
                                    className={`w-full outline-none focus:ring-2 rounded-lg px-2 py-1.5 cursor-pointer appearance-none transition-colors border text-sm font-bold shadow-sm ${getCountryColor(task.pais)}`}
                                    >
                                    <option value="" className="bg-white text-slate-500">País...</option>
                                    {opcionesPais.map(opt => (
                                        <option key={opt} value={opt} className="bg-white text-slate-800 font-normal">{opt}</option>
                                    ))}
                                    </select>
                                </td>
                                
                                {['c1', 'c2', 'c3', 'c4', 'c5'].map(corte => (
                                    <td key={corte} className="p-3 w-28 border-l border-slate-50 align-top">
                                    <SelectInput 
                                        value={task[corte]} 
                                        options={opcionesCorte} 
                                        onChange={(val) => updateTask(task.id, corte, val)} 
                                        className={
                                        task[corte] === 'Completado' ? 'text-emerald-700 bg-emerald-50 border-emerald-100' :
                                        task[corte] === 'En Proceso' ? 'text-amber-700 bg-amber-50 border-amber-100' :
                                        task[corte] === 'Aplica' ? 'text-blue-700 bg-blue-50/50 border-blue-100' : 'text-slate-400'
                                        }
                                    />
                                    </td>
                                ))}
                                
                                <td className="p-3 text-center w-12 align-top pt-5">
                                    <button onClick={() => deleteTask(task.id)} className="text-slate-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all p-2 rounded-lg hover:bg-red-50" title="Eliminar tarea">
                                    <TrashIcon />
                                    </button>
                                </td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                        {filteredTasks.length === 0 && (
                            <div className="text-center text-slate-500 py-20 flex flex-col items-center">
                            <FilterIcon className="mb-4 text-slate-300 w-12 h-12" />
                            <p className="text-lg font-medium">No hay tareas que coincidan con los filtros.</p>
                            </div>
                        )}
                        </div>
                    </div>
                    )}

                    {/* VISTA: PREGUNTAS */}
                    {activeTab === 'questions' && (
                    <div className="p-0">
                        <div className="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50/50">
                        <h2 className="text-xl font-bold text-slate-800 tracking-tight">Dudas y Requerimientos a FIT</h2>
                        <button onClick={addQuestion} className="flex items-center gap-2 text-sm bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2.5 rounded-lg transition-colors shadow-sm">
                            <PlusIcon /> Añadir Pregunta
                        </button>
                        </div>
                        <div className="overflow-x-auto pb-48">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-100 text-slate-600 uppercase text-[11px] tracking-wider">
                            <tr>
                                <th className="p-4 font-bold border-b border-slate-200">Segmento</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[300px]">Pregunta</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[350px]">Question (English)</th>
                                <th className="p-4 font-bold border-b border-slate-200">País</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[200px]">Responsable(s)</th>
                                <th className="p-4 font-bold border-b border-slate-200 text-center">¿Solicitado?</th>
                                <th className="p-4 font-bold border-b border-slate-200">Fecha Sol.</th>
                                <th className="p-4 font-bold border-b border-slate-200 min-w-[250px]">Respuesta FIT</th>
                                <th className="p-4 border-b border-slate-200 text-center"></th>
                            </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                            {filteredQuestions.map(q => (
                                <tr key={q.id} className="hover:bg-slate-50/80 transition-colors group">
                                <td className="p-3 w-40 align-top"><ComboboxInput value={q.segmento} options={sortedSegmentos} onChange={(val) => updateQuestion(q.id, 'segmento', val)} placeholder="Ej: Regalias" listId={`q-seg-${q.id}`} /></td>
                                <td className="p-3 align-top"><TextInput value={q.pregunta} onChange={(val) => updateQuestion(q.id, 'pregunta', val)} placeholder="Escribe tu pregunta en español..." allowCopy={true} /></td>
                                
                                <td className="p-3 align-top">
                                    <TextInput 
                                    value={q.questionEng} 
                                    onChange={(val) => updateQuestion(q.id, 'questionEng', val)} 
                                    placeholder="English translation..." 
                                    className={q.questionEng && q.questionEng.includes("[Pending") ? "bg-amber-50 border-amber-200 text-amber-700" : "bg-blue-50/30"} 
                                    allowCopy={true}
                                    />
                                </td>

                                <td className="p-3 w-32 align-top">
                                    <select 
                                    value={q.pais} 
                                    onChange={(e) => updateQuestion(q.id, 'pais', e.target.value)}
                                    className={`w-full outline-none focus:ring-2 rounded-lg px-2 py-1.5 cursor-pointer appearance-none transition-colors border text-sm font-bold shadow-sm ${getCountryColor(q.pais)}`}
                                    >
                                    <option value="" className="bg-white text-slate-500">País...</option>
                                    {opcionesPais.map(opt => (
                                        <option key={opt} value={opt} className="bg-white text-slate-800 font-normal">{opt}</option>
                                    ))}
                                    </select>
                                </td>
                                
                                <td className="p-3 w-52 align-top">
                                    <MultiSelectDropdown value={q.responsable} options={sortedResponsables} onChange={(val) => updateQuestion(q.id, 'responsable', val)} />
                                </td>

                                <td className="p-3 w-28 text-center align-top">
                                    <select 
                                    value={q.solicitado} 
                                    onChange={(e) => updateQuestion(q.id, 'solicitado', e.target.value)} 
                                    className={`bg-transparent outline-none focus:ring-2 focus:ring-blue-600 rounded-lg px-2 py-1.5 cursor-pointer appearance-none transition-colors border border-transparent hover:border-slate-300 text-center font-bold ${q.solicitado === 'Y' ? 'text-blue-700 bg-blue-100 border-blue-200' : 'text-slate-400'}`}
                                    >
                                    <option value="Y" className="bg-white text-slate-800">Y</option>
                                    <option value="N" className="bg-white text-slate-800">N</option>
                                    </select>
                                </td>
                                <td className="p-3 w-40 align-top">
                                    <input 
                                    type="date" 
                                    value={q.fecha} 
                                    onChange={(e) => updateQuestion(q.id, 'fecha', e.target.value)} 
                                    className="bg-transparent text-slate-700 outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white rounded-lg px-2 py-1.5 w-full transition-colors border border-transparent hover:border-slate-300 font-medium" 
                                    />
                                </td>
                                <td className="p-3 align-top"><TextInput value={q.respuesta} onChange={(val) => updateQuestion(q.id, 'respuesta', val)} placeholder="Respuesta..." allowCopy={true} /></td>
                                <td className="p-3 text-center w-12 align-top pt-5">
                                    <button onClick={() => deleteQuestion(q.id)} className="text-slate-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-all p-2 rounded-lg hover:bg-red-50" title="Eliminar pregunta">
                                    <TrashIcon />
                                    </button>
                                </td>
                                </tr>
                            ))}
                            </tbody>
                        </table>
                        {filteredQuestions.length === 0 && (
                            <div className="text-center text-slate-500 py-20 flex flex-col items-center">
                            <FilterIcon className="mb-4 text-slate-300 w-12 h-12" />
                            <p className="text-lg font-medium">No hay preguntas que coincidan con los filtros.</p>
                            </div>
                        )}
                        </div>
                    </div>
                    )}
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
